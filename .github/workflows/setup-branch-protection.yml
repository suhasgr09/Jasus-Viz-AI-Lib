name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protect-main:
    name: Apply branch protection rules to main branch
    runs-on: ubuntu-latest
    steps:
      - name: ✔️ Verify ADMIN_TOKEN is configured
        run: |
          if [ -z "${{ secrets.ADMIN_TOKEN }}" ]; then
            echo "⚠️  ADMIN_TOKEN secret not found."
            echo "To enable branch protection, add a Personal Access Token"
            echo "with 'repo' (admin) scope as a repository secret named ADMIN_TOKEN."
            exit 1
          fi
          echo "✅ ADMIN_TOKEN is configured."

      - name: 🔐 Apply strict branch protection to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            try {
              await github.rest.repos.updateBranchProtection({
                owner,
                repo,
                branch: 'main',
                required_status_checks: null,
                enforce_admins: true,             // ← Admins cannot bypass rules
                required_pull_request_reviews: {
                  required_approving_review_count: 1,  // ← Require 1 approval
                  dismiss_stale_reviews: true,        // ← Dismiss reviews when new commits are pushed
                  require_code_owner_reviews: true,   // ← Require CODEOWNERS approval
                  require_last_push_approval: false,  // ← Allow owner of last push to approve
                },
                required_conversation_resolution: true, // ← Resolve conversations before merge
                restrictions: null,                // ← No push restrictions (via lock_branch below)
                allow_force_pushes: false,         // ← Disable force pushes
                allow_deletions: false,            // ← Prevent branch deletion
                lock_branch: true,                 // ← Make main read-only; only PRs allowed
                required_linear_history: true,     // ← Require linear history (no merge commits)
              });
              
              core.notice(
                '✅  Branch protection applied to main:\n' +
                '  • Requires 1 approval (including CODEOWNERS)\n' +
                '  • Admins cannot bypass rules\n' +
                '  • Force pushes disabled\n' +
                '  • Conversations must be resolved\n' +
                '  • Linear history required\n' +
                '  • Branch is locked (PRs only)'
              );
            } catch (error) {
              core.setFailed(`❌ Failed to apply branch protection: ${error.message}`);
              throw error;
            }

      - name: 🔀 Create or verify develop branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            try {
              // Check if develop branch exists
              await github.rest.repos.getBranch({ owner, repo, branch: 'develop' });
              core.info('✅  develop branch already exists.');
            } catch (e) {
              if (e.status === 404) {
                // Get the SHA of main to branch from
                const { data: mainRef } = await github.rest.git.getRef({
                  owner, repo, ref: 'heads/main',
                });
                
                // Create develop branch
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: 'refs/heads/develop',
                  sha: mainRef.object.sha,
                });
                core.info('✅  develop branch created from main.');
              } else {
                throw e;
              }
            }

      - name: 🏷️ Create or verify release branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            try {
              // Check if release branch exists
              await github.rest.repos.getBranch({ owner, repo, branch: 'release' });
              core.info('✅  release branch already exists.');
            } catch (e) {
              if (e.status === 404) {
                // Get the SHA of main to branch from
                const { data: mainRef } = await github.rest.git.getRef({
                  owner, repo, ref: 'heads/main',
                });
                
                // Create release branch
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: 'refs/heads/release',
                  sha: mainRef.object.sha,
                });
                core.info('✅  release branch created from main.');
              } else {
                throw e;
              }
            }

      - name: 📋 Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 Branch Protection Configuration Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📍 Main Branch (Protected):"
          echo "   • Requires 1 approval + CODEOWNERS review"
          echo "   • No force pushes allowed"
          echo "   • Admin overrides disabled"
          echo "   • Pull requests required"
          echo ""
          echo "🔀 Development Branches:"
          echo "   • develop (for integration)"
          echo "   • release (for releases)"
          echo ""
          echo "🚀 PR Workflow:"
          echo "   1. Create feature branch from develop"
          echo "   2. Submit PR to develop"
          echo "   3. After review → Merge to develop"
          echo "   4. Create release branch and PR to main"
          echo "   5. Merge to main (locked, requires approval)"
          echo ""
