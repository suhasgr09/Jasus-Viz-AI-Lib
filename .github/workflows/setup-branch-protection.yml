name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protect-main:
    name: Apply branch protection rules
    runs-on: ubuntu-latest
    steps:
      - name: Protect main branch
        uses: actions/github-script@v7
        with:
          # A Personal Access Token with 'repo' (admin) scope must be stored
          # as a repository secret named ADMIN_TOKEN.
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // ── Protect main ──────────────────────────────────────────────
            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch: 'main',
              required_status_checks: null,
              enforce_admins: true,           // admins cannot bypass
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
              },
              restrictions: null,             // restrict pushers via lock_branch below
              allow_force_pushes: false,
              allow_deletions: false,
              lock_branch: true,              // make main fully read-only
              block_creations: true,
            });

            core.info('✅  main branch protection applied (locked, PR required).');

      - name: Ensure Release branch exists
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Check for both 'release' and 'Release'
            const branches = ['release', 'Release'];
            let exists = false;
            for (const b of branches) {
              try {
                await github.rest.repos.getBranch({ owner, repo, branch: b });
                core.info(`Branch '${b}' already exists – skipping creation.`);
                exists = true;
                break;
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

            if (!exists) {
              // Get the SHA of main to branch from
              const { data: mainRef } = await github.rest.git.getRef({
                owner, repo, ref: 'heads/main',
              });
              await github.rest.git.createRef({
                owner,
                repo,
                ref: 'refs/heads/release',
                sha: mainRef.object.sha,
              });
              core.info('✅  release branch created from main.');
            }
